<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reconhecimento com IA - Gabriel Silva De Lima</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body{
        background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
        min-height:100vh;
        color:white;
        font-family: Arial, Helvetica, sans-serif;
    }

    .main-card{
        max-width:700px;
        margin:auto;
        margin-top:40px;
        background: rgba(255,255,255,0.08);
        border:1px solid rgba(255,255,255,0.1);
        border-radius:20px;
        backdrop-filter: blur(12px);
        box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .title{
        font-size:2rem;
        font-weight:700;
    }

    #webcam-container canvas{
        width:100% !important;
        max-width:320px;
        border-radius:16px;
        border:4px solid rgba(255,255,255,0.15);
        box-shadow:0 10px 20px rgba(0,0,0,0.3);
    }

    .btn-camera{
        background: linear-gradient(45deg,#22c55e,#16a34a);
        border:none;
        padding:14px 28px;
        font-size:1.1rem;
        font-weight:700;
        border-radius:14px;
        color:white;
        transition:0.3s;
        box-shadow:0 10px 20px rgba(34,197,94,0.3);
    }

    .btn-camera:hover{
        transform:translateY(-2px);
        background: linear-gradient(45deg,#16a34a,#15803d);
    }

    .result-box{
        background:rgba(255,255,255,0.06);
        border-radius:14px;
        padding:12px;
        margin-bottom:12px;
    }

    .progress{
        height:22px;
        border-radius:12px;
        background:#1e293b;
    }

    .progress-bar{
        font-weight:700;
    }

    .footer-text{
        color:#cbd5e1;
        font-size:0.9rem;
    }

    @media (max-width:576px){
        .title{
            font-size:1.5rem;
        }

        .btn-camera{
            width:100%;
        }
    }
</style>
</head>

<body>

<div class="container py-4">

    <div class="main-card p-4 text-center">

        <h1 class="title mb-2">Reconhecimento com IA</h1>
        <p class="text-light mb-4">Gabriel Silva De Lima</p>

        <button type="button" class="btn-camera mb-4" onclick="init()">
            📷 Permitir Câmera e Iniciar
        </button>

        <div id="webcam-container" class="mb-4 d-flex justify-content-center"></div>

        <div id="label-container"></div>

        <p class="footer-text mt-4">
            Desenvolvido com Teachable Machine + TensorFlow.js
        </p>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/NT3o6rKvl/";

let model, webcam, labelContainer, maxPredictions;

async function init() {

    const botao = document.querySelector(".btn-camera");
    botao.innerHTML = "⏳ Carregando...";
    botao.disabled = true;

    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    const flip = true;
    webcam = new tmImage.Webcam(320, 320, flip);

    await webcam.setup();
    await webcam.play();

    window.requestAnimationFrame(loop);

    document.getElementById("webcam-container").innerHTML = "";
    document.getElementById("webcam-container").appendChild(webcam.canvas);

    labelContainer = document.getElementById("label-container");
    labelContainer.innerHTML = "";

    for(let i = 0; i < maxPredictions; i++){

        const item = document.createElement("div");
        item.className = "result-box";

        item.innerHTML = `
            <div class="d-flex justify-content-between mb-2">
                <span id="class-name-${i}">Classe ${i+1}</span>
                <span id="percent-${i}">0%</span>
            </div>

            <div class="progress">
                <div id="bar-${i}" class="progress-bar progress-bar-striped progress-bar-animated bg-success"
                     style="width:0%">
                </div>
            </div>
        `;

        labelContainer.appendChild(item);
    }

    botao.innerHTML = "✅ Câmera Ativa";
}

async function loop(){
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict(){

    const prediction = await model.predict(webcam.canvas);

    for(let i = 0; i < maxPredictions; i++){

        const classe = prediction[i].className;
        const prob = prediction[i].probability;
        const porcentagem = (prob * 100).toFixed(1);

        document.getElementById(`class-name-${i}`).innerText = classe;
        document.getElementById(`percent-${i}`).innerText = porcentagem + "%";

        const bar = document.getElementById(`bar-${i}`);
        bar.style.width = porcentagem + "%";
        bar.innerText = porcentagem + "%";

        if(porcentagem >= 70){
            bar.className = "progress-bar progress-bar-striped progress-bar-animated bg-success";
        }else if(porcentagem >= 40){
            bar.className = "progress-bar progress-bar-striped progress-bar-animated bg-warning";
        }else{
            bar.className = "progress-bar progress-bar-striped progress-bar-animated bg-danger";
        }
    }
}
</script>

</body>
</html>
